<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect
      const segment = 1;
      const path = location.pathname.split('/').slice(segment).join('/').replace(/\/$/, '');
      const base = location.pathname.split('/').slice(0, segment + 1).join('/');
      sessionStorage.setItem('redirect', path);
      location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
